# See https://github.com/marketplace/actions/todo-to-issue
name: "Run TODO to Issue"
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
      - name: "TODO to Issue"
        uses: "alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657" # v5.1.14
        with:
          AUTO_ASSIGN: true
          LANGUAGES: "https://raw.githubusercontent.com/cmahnke/projektemacher-base/main/.syntax.json"
